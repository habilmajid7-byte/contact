<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Premium Contact Form</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:
      linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
      url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1600&auto=format&fit=crop');
      background-size:cover;
      background-position:center;
      padding:20px;
    }

    .contact-container{
      width:100%;
      max-width:1100px;
      display:grid;
      grid-template-columns:1fr 1fr;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(15px);
      border:1px solid rgba(255,255,255,0.15);
      border-radius:25px;
      overflow:hidden;
      box-shadow:0 10px 40px rgba(0,0,0,0.4);
    }

    .left-side{
      padding:60px;
      color:white;
      position:relative;
    }

    .left-side h1{
      font-size:45px;
      margin-bottom:20px;
      line-height:1.2;
    }

    .left-side p{
      color:#ddd;
      margin-bottom:35px;
      line-height:1.8;
    }

    .info-box{
      margin-bottom:25px;
    }

    .info-box h3{
      font-size:18px;
      margin-bottom:5px;
      color:#00d4ff;
    }

    .info-box span{
      color:#ddd;
      font-size:15px;
    }

    .right-side{
      background:white;
      padding:60px 45px;
    }

    .right-side h2{
      margin-bottom:30px;
      color:#111;
      font-size:32px;
    }

    .input-box{
      margin-bottom:20px;
    }

    .input-box input,
    .input-box textarea{
      width:100%;
      padding:16px 18px;
      border:none;
      background:#f3f3f3;
      border-radius:12px;
      font-size:15px;
      transition:0.3s;
      outline:none;
    }

    .input-box input:focus,
    .input-box textarea:focus{
      background:#e8f9ff;
      border:2px solid #00bfff;
    }

    .input-box textarea{
      resize:none;
      height:140px;
    }

    .btn{
      width:100%;
      padding:16px;
      border:none;
      border-radius:12px;
      background:linear-gradient(135deg,#00bfff,#0044ff);
      color:white;
      font-size:17px;
      font-weight:600;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{
      transform:translateY(-3px);
      box-shadow:0 10px 20px rgba(0,68,255,0.4);
    }

    @media(max-width:900px){
      .contact-container{
        grid-template-columns:1fr;
      }

      .left-side{
        padding:40px;
      }

      .right-side{
        padding:40px;
      }

      .left-side h1{
        font-size:35px;
      }
    }
  </style>
</head>
<body>

  <div class="contact-container">

    <div class="left-side">
      <h1>Contact Us</h1>

      <p>
        Welcome to HABIL MAJYD DIGITAL HEADQUARTERS.
        Feel free to contact us anytime for web development,
        digital services, branding and technology solutions.
      </p>

      <div class="info-box">
        <h3>Email</h3>
        <span>habilmajid7@gmail.com</span>
      </div>


      <div class="info-box">
        <h3>Location</h3>
        <span>Zanzibar, Tanzania</span>
      </div>
    </div>

    <div class="right-side">
      <h2>Send Message</h2>

      
          <form class="contact-form" id="contactForm" action="https://formspree.io/f/mojpadlv" method="POST">

  <div class="input-box">
    <input type="text" name="name" placeholder="Full Name" required>
  </div>

  <div class="input-box">
    <input type="email" name="email" placeholder="Email Address" required>
  </div>

  <div class="input-box">
    <input type="text" name="subject" placeholder="Subject" required>
  </div>

  <div class="input-box">
    <textarea name="message" placeholder="Write your message..." required></textarea>
  </div>

  <button type="submit" class="btn">
    Send Message
  </button>

</form>

      </form>
    </div>

  </div>

</body>
</html>
